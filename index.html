<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Form</title>
</head>

<body class="mt-5">
    <div class="container-fluid justify-content-center">
        <div class="row">
            <div class="col-10 mx-auto">
                <div class="card">
                    <div class="card-header">
                        <h3>Payment form example</h3>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger" role="alert">
                            Some fields are missing
                        </div>
                        <div class="row">
                            <div class="col-5">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">Card #</label>
                                    <input type="text" class="form-control" id="formGroupExampleInput"
                                        placeholder="xxxxxxxxxxxxxxxx">
                                </div>
                            </div>
                            <div class="col-3">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">CVC #</label>
                                    <input type="text" class="form-control" id="formGroupExampleInput"
                                        placeholder="000">
                                </div>
                            </div>
                            <i class="fa-solid fa-dollar-sign my-auto"></i>
                            <div class="col-3">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">Amount</label>

                                    <input type="text" class="form-control" id="formGroupExampleInput"
                                        placeholder="Amount">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">Fist Name</label>
                                    <input type="text" class="form-control" id="formGroupExampleInput">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="formGroupExampleInput">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">City</label>
                                    <input type="text" class="form-control" id="formGroupExampleInput">
                                </div>
                            </div>
                            <div class="col-3">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">City</label>
                                    <select class="form-select" aria-label="Default select example">
                                        <option selected>Pick a state</option>
                                        <option value="1">One</option>
                                        <option value="2">Two</option>
                                        <option value="3">Three</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-3">
                                <div class="mb-3">
                                    <label for="formGroupExampleInput" class="form-label">Postal Code</label>
                                    <input type="text" class="form-control" id="formGroupExampleInput">
                                </div>
                            </div>
                            <div class="col-6 ">
                                <div class="col">
                                    <label for="formGroupExampleInput" class="form-label">We accept:</label>
                                </div>
                                <div class="d-inline-flex p-1 rounded bg-secondary">
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input bg-dark-subtle" type="radio"
                                            name="inlineRadioOptions" id="inlineRadio1" value="option1">
                                        <label class="form-check-label" for="inlineRadio1"><i
                                                class="fa-brands fa-cc-mastercard"
                                                style="color: rgb(225,225,225);"></i></label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input bg-dark-subtle" type="radio"
                                            name="inlineRadioOptions" id="inlineRadio2" value="option2">
                                        <label class="form-check-label" for="inlineRadio2"><i
                                                class="fa-brands fa-cc-visa"
                                                style="color: rgb(225,225,225);"></i></label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input bg-dark-subtle" type="radio"
                                            name="inlineRadioOptions" id="inlineRadio3" value="option3">
                                        <label class="form-check-label" for="inlineRadio3"><i
                                                class="fa-brands fa-cc-diners-club"
                                                style="color: rgb(225,225,225);"></i></label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input bg-dark-subtle" type="radio"
                                            name="inlineRadioOptions" id="inlineRadio4" value="option4">
                                        <label class="form-check-label" for="inlineRadio4"
                                            style="color: rgb(225,225,225);"><i
                                                class="fa-brands fa-cc-amex"></i></label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="mb-3">
                                    <label for="exampleFormControlTextarea1" class="form-label">Example textarea</label>
                                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                                    <p class="text-body-secondary">Add any notes here.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-end">
                        <button type="button" class="btn btn-secondary">Cancel</button>
                        <button type="button" class="btn btn-primary">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/6c9b2610b4.js" crossorigin="anonymous"></script>
</body>

</html>
